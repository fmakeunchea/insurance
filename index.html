            "@type": "Answer",

          "@type": "Question",
          "name": "What is the difference between term life and whole life insurance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Term life covers you for a set period (10-30 years) at the lowest cost. Whole life covers you for your entire life and builds cash value. IUL (Index Universal Life) offers permanent coverage with market-linked cash value growth and living benefits."
          }
        },
        {
          "@type": "Question",
          "name": "What is IUL (Index Universal Life) insurance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "IUL is permanent life insurance where your cash value grows tied to market indexes like the S&P 500, with a 0% floor so you never lose money. You can access cash through tax-free loans and withdrawals, plus get living benefits for critical, chronic, and terminal illness."
          }
        },
        {
          "@type": "Question",
          "name": "How much does life insurance cost in Virginia?",

          }
        }
